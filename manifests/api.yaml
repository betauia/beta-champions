apiVersion: apps/v1
kind: Deployment
metadata:
  name: json-api
  namespace: beta-champions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: json-api
  template:
    metadata:
      labels:
        app: json-api
    spec:
      serviceAccountName: api-sa
      containers:
        - name: api
          image: json-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: shared-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: shared-data-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: json-api
  namespace: beta-champions
spec:
  type: ClusterIP
  selector:
    app: json-api
  ports:
    - name: http
      port: 8000
      targetPort: http
